name: Deploy webapp to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write # push to the gh-pages branch

# One deployment at a time; let a running one finish.
concurrency:
  group: pages
  cancel-in-progress: false

# GitHub Pages serves the gh-pages branch (Settings > Pages > Deploy from a
# branch). This workflow tests, builds and pushes dist/ to the root of that
# branch; the PR previews live under pr-preview/ (see pr-preview.yml).
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      # `clean-exclude` keeps the PR previews alive and `force: false`
      # rebases instead of clobbering a concurrent preview push.
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean-exclude: pr-preview
          force: false
